# ═══════════════════════════════════════════════════════════════
#  RECRUITPRO — AUTO DEPLOY TO AWS EC2
#  Triggers automatically when you push to 'main' branch
#  COST: 100% FREE (GitHub Actions free tier = 2000 min/month)
# ═══════════════════════════════════════════════════════════════

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Step 1: Get the code ───────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Connect to your EC2 server and deploy ─────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "========================================="
            echo "  RECRUITPRO AUTO-DEPLOY STARTED"
            echo "  Time: $(date)"
            echo "========================================="

            # Go to project directory
            cd /home/ubuntu/recruitpro

            # Pull latest code from GitHub
            echo ""
            echo "[1/6] Pulling latest code..."
            git pull origin main

            # Install any new packages
            echo ""
            echo "[2/6] Installing packages..."
            bun install 2>/dev/null || npm install --legacy-peer-deps

            # Push database schema changes (if any)
            echo ""
            echo "[3/6] Updating database schema..."
            bun run db:push

            # Build the app for production
            echo ""
            echo "[4/6] Building app for production (takes 2-3 min)..."
            bun run build

            # Copy static files & assets into standalone folder
            echo ""
            echo "[5/6] Preparing production files..."
            rm -rf .next/standalone/.next/static
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public 2>/dev/null || true
            cp -r prisma .next/standalone/prisma 2>/dev/null || true

            # Make sure db directory exists in standalone
            mkdir -p .next/standalone/db

            # Ensure .env file exists in standalone folder
            if [ ! -f .next/standalone/.env ]; then
              cp .env .next/standalone/.env 2>/dev/null || echo "DATABASE_URL=\"file:./db/custom.db\"" > .next/standalone/.env
            fi

            # Restart the app with PM2
            echo ""
            echo "[6/6] Restarting app with PM2..."
            pm2 restart recruitpro 2>/dev/null || pm2 start ecosystem.config.js

            # Wait and verify
            sleep 3
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            
            echo ""
            echo "========================================="
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ DEPLOY SUCCESSFUL!"
            else
              echo "  ⚠️  DEPLOY DONE — Server status: $HTTP_CODE"
              echo "  Check with: pm2 logs recruitpro --lines 20"
            fi
            echo "  App URL: https://app.akolta.com"
            echo "========================================="
