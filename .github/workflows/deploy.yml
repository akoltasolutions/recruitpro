name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          command_timeout: 8m
          envs: RESEND_API_KEY
          script: |
            cd /home/ubuntu/recruitpro
            # Ensure RESEND_API_KEY is set in .env
            if [ -n "$RESEND_API_KEY" ]; then
              if grep -q 'RESEND_API_KEY=' .env 2>/dev/null; then
                sed -i 's|^RESEND_API_KEY=.*|RESEND_API_KEY="'"$RESEND_API_KEY"'"|' .env
              else
                echo 'RESEND_API_KEY="'"$RESEND_API_KEY"'"' >> .env
              fi
              echo "[deploy] RESEND_API_KEY injected into .env"
            else
              echo "[deploy] WARNING: RESEND_API_KEY not available (GitHub secret not set)"
            fi
            chmod +x deploy.sh
            bash deploy.sh 2>&1
